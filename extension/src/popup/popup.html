<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    :root {
      --bg: #0d1117;
      --card: #161b22;
      --border: #30363d;
      --text: #c9d1d9;
      --text-dim: #8b949e;
      --accent: #58a6ff;
      --green: #3fb950;
      --orange: #d29922;
      --radius: 8px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      min-height: 300px;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
    }

    .container { padding: 16px; }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .logo {
      font-size: 18px;
      font-weight: 700;
      color: var(--accent);
    }

    .status-badge {
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
    }

    .status-badge.connected {
      background: #0a2e1a;
      color: var(--green);
    }

    .status-badge.disconnected {
      background: #2e1a0a;
      color: var(--orange);
    }

    .status-badge.computing {
      background: #0a1a2e;
      color: var(--accent);
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      margin-bottom: 8px;
    }

    .card-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 4px;
    }

    .card-row:last-child { margin-bottom: 0; }

    .label { color: var(--text-dim); }
    .value { font-weight: 600; }
    .value.highlight { color: var(--accent); }

    .section-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-dim);
      margin: 12px 0 6px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 8px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--card);
      color: var(--text);
      font-size: 13px;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      transition: background 0.15s;
    }

    .btn:hover { background: #1c2333; }
    .btn.primary { border-color: var(--accent); color: var(--accent); }

    .task-item {
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
    }

    .task-item:last-child { border-bottom: none; }

    .task-desc { color: var(--text); margin-bottom: 2px; }
    .task-meta { color: var(--text-dim); font-size: 11px; }

    .footer {
      text-align: center;
      padding-top: 12px;
      color: var(--text-dim);
      font-size: 11px;
    }

    .footer a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <span class="logo">🦞 ClawNet</span>
      <span class="status-badge" id="status-badge">初始化中</span>
    </div>

    <div class="card">
      <div class="card-row">
        <span class="label">节点 ID</span>
        <span class="value" id="node-id">--</span>
      </div>
      <div class="card-row">
        <span class="label">令牌余额</span>
        <span class="value highlight" id="token-balance">0</span>
      </div>
      <div class="card-row">
        <span class="label">连接节点</span>
        <span class="value" id="peer-count">0</span>
      </div>
      <div class="card-row">
        <span class="label">等待任务</span>
        <span class="value" id="queue-length">0</span>
      </div>
      <div class="card-row">
        <span class="label">能力</span>
        <span class="value" id="capabilities">--</span>
      </div>
    </div>

    <div class="section-title">当前任务</div>
    <div class="card">
      <div id="current-task" class="task-item">
        <span style="color: var(--text-dim);">无</span>
      </div>
    </div>

    <div class="section-title">操作</div>
    <a class="btn" href="#" id="btn-submit-task">提交任务</a>
    <a class="btn primary" href="https://github.com/asteroidea95/ClawNet" target="_blank" style="margin-top: 6px;">GitHub ↗</a>

    <div class="footer">
      算力贡献: <span id="uptime">0</span> 分钟 · <span id="tasks-completed">0</span> 任务完成
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
