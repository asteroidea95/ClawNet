<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    :root {
      --bg: #0d1117;
      --card: #161b22;
      --border: #30363d;
      --text: #c9d1d9;
      --text-dim: #8b949e;
      --accent: #58a6ff;
      --green: #3fb950;
      --orange: #d29922;
      --red: #f85149;
      --radius: 8px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 360px;
      min-height: 400px;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
    }

    .container { padding: 16px; }
    .hidden { display: none !important; }

    /* 顶部导航标签 */
    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 12px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 8px;
    }

    .tab {
      padding: 4px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      color: var(--text-dim);
    }

    .tab.active {
      background: var(--card);
      color: var(--accent);
    }

    /* 头部 */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .logo { font-size: 18px; font-weight: 700; color: var(--accent); }

    .status-badge {
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
    }
    .status-badge.connected { background: #0a2e1a; color: var(--green); }
    .status-badge.disconnected { background: #2e1a0a; color: var(--orange); }
    .status-badge.computing { background: #0a1a2e; color: var(--accent); }
    .status-badge.idle { background: #0a2e1a; color: var(--green); }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      margin-bottom: 8px;
    }

    .card-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 4px;
    }
    .card-row:last-child { margin-bottom: 0; }
    .label { color: var(--text-dim); }
    .value { font-weight: 600; }
    .value.highlight { color: var(--accent); }
    .value.green { color: var(--green); }
    .value.orange { color: var(--orange); }

    .section-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-dim);
      margin: 12px 0 6px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 8px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--card);
      color: var(--text);
      font-size: 13px;
      cursor: pointer;
      text-align: center;
      transition: background 0.15s;
    }
    .btn:hover { background: #1c2333; }
    .btn.primary { border-color: var(--accent); color: var(--accent); }
    .btn.danger { border-color: var(--red); color: var(--red); }

    .task-result {
      background: #0d1117;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 8px;
      font-size: 12px;
      max-height: 120px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
      font-family: monospace;
    }

    input, textarea, select {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--bg);
      color: var(--text);
      font-size: 12px;
      margin-bottom: 6px;
    }

    textarea { min-height: 60px; resize: vertical; font-family: monospace; }

    label {
      display: block;
      font-size: 11px;
      color: var(--text-dim);
      margin-bottom: 2px;
    }

    .log-item {
      padding: 4px 0;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
    }
    .log-item:last-child { border-bottom: none; }
    .log-time { color: var(--text-dim); margin-right: 4px; }
    .log-msg { color: var(--text); }

    .footer {
      text-align: center;
      padding-top: 12px;
      color: var(--text-dim);
      font-size: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 头部 -->
    <div class="header">
      <span class="logo">🦞 ClawNet</span>
      <span class="status-badge" id="status-badge">● 初始化</span>
    </div>

    <!-- 标签页 -->
    <div class="tabs">
      <span class="tab active" data-tab="dashboard">仪表盘</span>
      <span class="tab" data-tab="submit">提交任务</span>
      <span class="tab" data-tab="logs">日志</span>
    </div>

    <!-- ==================== 仪表盘 ==================== -->
    <div id="tab-dashboard">
      <div class="card">
        <div class="card-row">
          <span class="label">节点 ID</span>
          <span class="value" id="node-id">--</span>
        </div>
        <div class="card-row">
          <span class="label">令牌余额</span>
          <span class="value highlight" id="token-balance">0</span>
        </div>
        <div class="card-row">
          <span class="label">在线节点</span>
          <span class="value" id="peer-count">0</span>
        </div>
        <div class="card-row">
          <span class="label">队列中任务</span>
          <span class="value" id="queue-length">0</span>
        </div>
        <div class="card-row">
          <span class="label">设备能力</span>
          <span class="value" id="capabilities">--</span>
        </div>
      </div>

      <div class="section-title">任务执行模式</div>
      <div class="card">
        <div class="card-row" style="margin-bottom:8px">
          <span class="label">自动接单</span>
          <label style="position:relative;width:36px;height:20px;cursor:pointer">
            <input type="checkbox" id="auto-accept" checked
              style="opacity:0;width:0;height:0;position:absolute">
            <span id="toggle-track" style="display:block;width:36px;height:20px;border-radius:10px;
              background:var(--accent);transition:0.2s;position:relative;">
              <span id="toggle-knob" style="display:block;width:16px;height:16px;border-radius:50%;
                background:white;position:absolute;top:2px;right:2px;transition:0.2s;"></span>
            </span>
          </label>
        </div>
        <div class="card-row">
          <span class="label">WebGPU 加速</span>
          <span id="webgpu-status" class="value orange">检测中...</span>
        </div>
      </div>

      <div class="section-title">当前任务</div>
      <div class="card">
        <div id="current-task" style="color:var(--text-dim);font-size:12px;">空闲</div>
      </div>

      <div class="card-row" style="font-size:11px;color:var(--text-dim);padding-top:8px;">
        <span>算力贡献: <span id="uptime">0</span> 分钟</span>
        <span>完成 <span id="tasks-completed">0</span> 个任务</span>
      </div>
    </div>

    <!-- ==================== 提交任务 ==================== -->
    <div id="tab-submit" class="hidden">
      <div class="card">
        <label>任务类型</label>
        <select id="task-type">
          <option value="dom-search">🔍 网页搜索（DOM）</option>
          <option value="dom-extract">📋 提取页面数据</option>
          <option value="dom-summarize">📝 精炼页面摘要</option>
          <option value="dom-monitor">👀 监控页面变化</option>
          <option value="image-gen">🎨 图片生成</option>
        </select>

        <label>目标网址（留空 = 当前页面）</label>
        <input type="url" id="task-url" placeholder="https://...">

        <label>关键词 / 描述</label>
        <textarea id="task-desc" placeholder="例: 华为畅享90 测评"></textarea>

        <label>额外参数（JSON，可选）</label>
        <textarea id="task-params" placeholder='{"selector": ".video-title", "maxResults": 5}'></textarea>

        <label style="display:flex;justify-content:space-between;margin-top:6px;">
          <span>支付令牌</span>
          <span style="color:var(--accent);font-weight:600;" id="task-reward-label">1</span>
        </label>
        <input type="range" id="task-reward" min="1" max="10" value="1" step="1"
          style="margin-bottom:4px;">
      </div>

      <button class="btn primary" id="btn-execute">执行任务</button>
      <div id="task-result-area" class="hidden" style="margin-top:8px;">
        <div class="section-title">执行结果</div>
        <div class="task-result" id="task-result"></div>
      </div>
    </div>

    <!-- ==================== 日志 ==================== -->
    <div id="tab-logs" class="hidden">
      <div class="card" id="log-list" style="max-height:300px;overflow-y:auto;">
        <div style="color:var(--text-dim);font-size:12px;">暂无日志</div>
      </div>
      <button class="btn" id="btn-clear-logs" style="margin-top:4px;">清空日志</button>
    </div>

    <div class="footer">
      <a href="https://github.com/asteroidea95/ClawNet" target="_blank" style="color:var(--accent);text-decoration:none;">ClawNet v0.1</a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
